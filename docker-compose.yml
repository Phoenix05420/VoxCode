version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: voxcode-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voxcode_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voxcode-network

  # Flask Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voxcode-backend
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 'True'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/voxcode_dev
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voxcode-network
    command: flask run --host=0.0.0.0

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: voxcode-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-next:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - voxcode-network
    command: npm run dev -- -p 3000 --hostname 0.0.0.0

volumes:
  postgres_data:

networks:
  voxcode-network:
    driver: bridge
